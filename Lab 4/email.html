<!DOCTYPE html>
<html>
<body>
    <div>
        EMAIL <br>
        <input type="text" id="email"> <b title="Hint: sample@example.com" style="cursor:help;">i</b><br>
        <br>
        <input type="button" id="btn" value="Submit">
        <p id="msg"></p>
    </div>
    <script>
        let btn = document.getElementById('btn');
        btn.addEventListener('click', function() {
            let email = document.getElementById('email').value;
            let msg = document.getElementById('msg');
            let hasAt = false;

            for(let i=0; i < email.length; i++) {
                if(email[i] === "@") { hasAt = true; }
            }

            if (email == "") {
                msg.style.color = 'red';
                msg.innerHTML = "Cannot be empty";
            } else if (!hasAt) {
                msg.style.color = 'red';
                msg.innerHTML = "Invalid: Must contain @";
            } else {
                msg.style.color = 'green';
                msg.innerHTML = "Valid Email";
            }
        });
    </script>
</body>
</html>
